<!DOCTYPE html>
<html lang="el">
<head>
<meta charset="UTF-8">
<title>Petras Group — Print</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'DM Sans',sans-serif;font-size:11px;color:#111827;background:#fff;line-height:1.5}
#loading{display:flex;align-items:center;justify-content:center;height:90vh;
  font-size:13px;color:#6B7280;gap:10px;font-family:'DM Sans',sans-serif}
.spin{width:18px;height:18px;border:2px solid #E5E7EB;border-top-color:#0B1929;
  border-radius:50%;animation:sp .7s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}

/* ── PRINT BAR (screen only) ── */
.pbar{position:fixed;top:0;left:0;right:0;z-index:99;
  background:#0B1929;padding:10px 24px;
  display:flex;align-items:center;justify-content:space-between;
  border-bottom:2px solid #172C45}
.pbar-left{display:flex;align-items:center;gap:14px}
.pbar-logo{font-family:'Syne',sans-serif;font-size:15px;font-weight:800;
  letter-spacing:0.5px;color:#fff}
.pbar-logo span{color:#8B95A1}
.pbar-div{width:1px;height:16px;background:rgba(255,255,255,0.15)}
.pbar-title{font-size:11px;color:rgba(196,207,219,0.7);letter-spacing:0.3px}
.pbar-btn{background:#6B7280;color:#fff;border:none;padding:7px 20px;
  border-radius:5px;font-size:11px;font-weight:700;cursor:pointer;
  font-family:'DM Sans',sans-serif;letter-spacing:0.4px;transition:background .12s}
.pbar-btn:hover{background:#4B5563}
.pbar-spacer{height:46px}

/* ── DOC WRAPPER ── */
#doc{display:none;padding:36px 44px;max-width:900px;margin:0 auto}

/* ── HEADER ── */
.doc-header{display:flex;justify-content:space-between;align-items:flex-start;
  padding-bottom:18px;margin-bottom:20px;
  border-bottom:3px solid #0B1929}
.carrier-label{font-size:8px;font-weight:700;letter-spacing:1.5px;
  text-transform:uppercase;color:#9CA3AF;margin-bottom:4px}
.carrier-name{font-size:15px;font-weight:700;color:#0B1929}
.carrier-sub{font-size:10.5px;color:#4B5563;line-height:1.7;margin-top:2px}
.plates-tag{display:inline-block;background:#0B1929;color:#fff;font-weight:700;
  font-size:12px;padding:3px 12px;border-radius:3px;margin-top:6px;letter-spacing:1px}
.brand-wrap{text-align:right}
.brand{font-family:'Syne',sans-serif;font-size:19px;font-weight:800;
  color:#0B1929;letter-spacing:0.5px}
.brand span{color:#8B95A1}
.brand-sub{font-size:7.5px;color:#9CA3AF;letter-spacing:2px;text-transform:uppercase;margin-top:1px}
.co-info{margin-top:6px;font-size:10.5px;color:#4B5563;line-height:1.7;text-align:right}
.co-info b{color:#0B1929;font-weight:600}

/* ── DRIVER BLOCK (owned fleet) ── */
.driver-block{background:#0B1929;border-radius:6px;padding:12px 18px;margin-bottom:18px}
.driver-block-row{display:flex;gap:32px;align-items:center}
.db-item .lbl{font-size:8px;font-weight:700;letter-spacing:1.2px;
  text-transform:uppercase;color:rgba(196,207,219,0.55);margin-bottom:2px}
.db-item .val{font-size:13px;font-weight:700;color:#fff;letter-spacing:0.3px}

/* ── DOC TITLE ── */
.doc-title{text-align:center;font-family:'Syne',sans-serif;font-size:13px;font-weight:700;
  padding:9px 0;margin:0 0 16px;
  border-top:2px solid #0B1929;border-bottom:2px solid #0B1929;
  letter-spacing:1.2px;text-transform:uppercase;color:#0B1929}

/* ── META GRID ── */
.meta{display:grid;grid-template-columns:1fr 1fr;gap:0;margin-bottom:16px;
  border:1px solid #E5E7EB;border-radius:6px;overflow:hidden}
.meta-item{padding:7px 14px;border-bottom:1px solid #F3F4F6;
  display:flex;gap:10px;align-items:center}
.meta-item:nth-child(odd){border-right:1px solid #F3F4F6}
.meta-item:last-child,.meta-item:nth-last-child(2){border-bottom:none}
.meta-lbl{font-size:9px;font-weight:700;letter-spacing:1px;
  text-transform:uppercase;color:#9CA3AF;min-width:72px;flex-shrink:0}
.meta-val{font-size:11px;font-weight:600;color:#111827}

/* ── PRICE BAR ── */
.price-bar{display:flex;justify-content:space-between;align-items:center;
  background:#F8FAFC;border:1.5px solid #8B95A1;border-radius:6px;
  padding:12px 20px;margin-bottom:20px}
.price-amount{font-family:'Syne',sans-serif;font-size:22px;font-weight:800;color:#8B95A1}
.price-lbl{font-size:8.5px;font-weight:700;letter-spacing:1px;
  text-transform:uppercase;color:#9CA3AF;margin-bottom:3px}
.price-terms{text-align:right}
.price-terms .val{font-size:12px;font-weight:700;color:#0B1929}

/* ── SECTION TITLE ── */
.section-title{font-size:9px;font-weight:800;text-transform:uppercase;
  letter-spacing:1.8px;color:#fff;background:#172C45;
  padding:5px 14px;margin:18px 0 8px;
  border-left:3px solid #8B95A1;border-radius:0 3px 3px 0}

/* ── STOP CARD ── */
.stop-card{border:1px solid #E5E7EB;border-radius:6px;padding:14px 18px;
  margin-bottom:8px;background:#FAFAFA}
.stop-name{font-size:14px;font-weight:700;color:#0B1929;margin-bottom:2px}
.stop-addr{font-size:10.5px;color:#6B7280;margin-bottom:6px}
.stop-map{font-size:10px;color:#2563EB;text-decoration:none;display:inline-block;margin-bottom:6px}
.stop-map:hover{text-decoration:underline}
.stop-grid{display:grid;grid-template-columns:1fr 1fr;gap:3px 24px}
.stop-field{display:flex;gap:8px;padding:2px 0;font-size:10.5px}
.stop-field b{color:#374151;min-width:116px;font-weight:600;flex-shrink:0}
.stop-field span{color:#111827}

/* ── BADGE ── */
.badge{display:inline-block;font-size:8px;font-weight:800;letter-spacing:0.8px;
  text-transform:uppercase;padding:2px 7px;border-radius:3px;
  color:#fff;margin-left:6px;vertical-align:middle}
.b-risk   {background:#DC2626}
.b-pe     {background:#059669}
.b-grp    {background:#0EA5E9}
.b-veroia {background:#0B1929}

/* ── NOTES ── */
.notes-box{margin:12px 0;padding:10px 16px;border:1px solid #E5E7EB;
  border-radius:6px;background:#FAFAFA;font-size:10.5px;color:#374151}
.notes-box b{color:#0B1929}

/* ── SIGNATURE ── */
.sig-table{width:100%;border-collapse:collapse;margin-top:28px}
.sig-table td{width:50%;padding:12px 18px;border:1px solid #0B1929;vertical-align:top}
.sig-name{font-weight:700;font-size:12px;color:#0B1929;margin-bottom:2px}
.sig-role{font-size:8.5px;font-weight:700;letter-spacing:1px;
  text-transform:uppercase;color:#9CA3AF;margin-bottom:28px}
.sig-line{border-top:1px solid #D1D5DB;padding-top:5px;
  font-size:9px;color:#9CA3AF;text-align:center}

@media print{
  .pbar,.pbar-spacer{display:none}
  #doc{padding:20px 28px}
}
</style>
</head>
<body>
<div id="loading"><div class="spin"></div>Loading…</div>
<div id="doc"></div>

<script>
const AT_TOKEN='patpPJXnFYnxdgoK3.a2162b09fbb214628114ff2ce68bb5a7b30aea2061b14f9562a1ab222585cf08';
const AT_BASE='appElT5CQV6JQvym8';
const T_ORDERS='tblgHlNmLBH3JTdIM',T_PARTNERS='tblLHl5m8bqONfhWv',
      T_TRUCKS='tblEAPExIAjiA3asD',T_TRAILERS='tblDcrqRJXzPrtYLm',
      T_DRIVERS='tbl7UGmYhc2Y82pPs',T_LOCS='tblxu8DRfTQOFRCzS',
      T_STOPS='tblaeY5QOHAS1gyE8';
var orderStops=[];
const DISPATCHER='Δ. Πέτρας';

const params=new URLSearchParams(window.location.search);
const orderId=params.get('orderId');
const leg=params.get('leg')||'export';

var allLocations=[],allPartners=[],allTrucks=[],allTrailers=[],allDrivers=[];

function fv(v){return Array.isArray(v)?v[0]||'':v||'';}
function fmt(s){if(!s)return'—';try{var p=s.split('T')[0].split('-');return p[2]+'/'+p[1]+'/'+p[0];}catch(e){return s;}}
// Format with time if time component is meaningful (not 00:00 or 12:00 sentinel)
function fmtDT(s){
  if(!s)return'—';
  try{
    var p=s.split('T');
    var d=p[0].split('-');
    var base=d[2]+'/'+d[1]+'/'+d[0];
    if(p[1]){
      var t=p[1].slice(0,5); // HH:MM
      // Skip sentinel times (00:00, 12:00) that usually indicate "time unknown"
      if(t!=='00:00'&&t!=='12:00') return base+' '+t;
    }
    return base;
  }catch(e){return s;}
}
function eur(v){if(!v&&v!==0)return'—';return parseFloat(v).toLocaleString('el-GR',{minimumFractionDigits:2,maximumFractionDigits:2})+' EUR';}

async function atFetch(table,qs){
  var records=[],offset='';
  do{
    var url='https://api.airtable.com/v0/'+AT_BASE+'/'+table+'?pageSize=100'+(qs||'')+(offset?'&offset='+offset:'');
    var d=await(await fetch(url,{headers:{Authorization:'Bearer '+AT_TOKEN}})).json();
    records=records.concat(d.records||[]);offset=d.offset||'';
  }while(offset);return records;
}
async function atGet(table,id){
  return(await(await fetch('https://api.airtable.com/v0/'+AT_BASE+'/'+table+'/'+id,
    {headers:{Authorization:'Bearer '+AT_TOKEN}})).json());
}

function resolveLoc(locField){
  if(!locField||!Array.isArray(locField)||!locField.length)return null;
  var loc=allLocations.find(r=>r.id===locField[0]);if(!loc)return null;
  var l=loc.fields,parts=[];
  if(l['Address'])parts.push(l['Address']);if(l['City'])parts.push(l['City']);
  if(l['State/province'])parts.push(l['State/province']);if(l['Country'])parts.push(l['Country']);
  return{name:l['Name']||'—',address:parts.join(', '),lat:l['Latitude']||'',lng:l['Longitude']||''};
}

function buildCard(num,loc,dtLabel,dt,pals,palType,showDetails,goods,pe,gw,temp,refr){
  var h='<div class="stop-card">';
  h+='<div class="stop-name">'+num+'. '+loc.name+'</div>';
  if(loc.address)h+='<div class="stop-addr">'+loc.address+'</div>';
  if(loc.lat&&loc.lng)h+='<a class="stop-map" href="https://www.google.com/maps?q='+loc.lat+','+loc.lng+'" target="_blank">📍 Open in Maps ('+loc.lat+', '+loc.lng+')</a>';
  h+='<div class="stop-grid">';
  h+='<div class="stop-field"><b>Date &amp; Time of '+dtLabel+':</b><span>'+fmtDT(dt)+'</span></div>';
  if(showDetails){
    if(goods)h+='<div class="stop-field"><b>Goods:</b><span>'+goods+'</span></div>';
    h+='<div class="stop-field"><b>Pallet no:</b><span>'+(pals||'—')+' '+(palType||'EUR')+'</span></div>';
    h+='<div class="stop-field"><b>Pallet Exchange:</b><span>'+pe+'</span></div>';
    if(gw)h+='<div class="stop-field"><b>Gross Weight:</b><span>'+gw+' KG</span></div>';
    if(temp!==''&&temp!=null)h+='<div class="stop-field"><b>Temperature:</b><span>'+temp+'°C</span></div>';
    if(refr)h+='<div class="stop-field"><b>Refrigerator:</b><span>'+refr+'</span></div>';
  }else{
    h+='<div class="stop-field"><b>Pallet no:</b><span>'+(pals||'—')+' '+(palType||'EUR')+'</span></div>';
  }
  h+='</div></div>';return h;
}

function buildLoadHTML(f,isExport,veroiaSwitch,VEROIA,VADDR,VLAT,VLNG){
  var dt=f['Loading DateTime']||'';
  if(veroiaSwitch&&isExport){
    var vDt=dt?new Date(new Date(dt).getTime()+86400000).toISOString():'';
    return buildCard(1,{name:VEROIA,address:VADDR,lat:VLAT,lng:VLNG},'loading',vDt,
      fv(f['Total Pallets']),fv(f['Pallet Type']),true,fv(f['Goods']),
      f['Pallet Exchange']?'YES':'NO',f['Gross Weight kg'],f['Temperature °C'],f['Refrigerator Mode']);
  }
  var loadStops=orderStops.filter(function(r){return r.fields['Stop Type']==='Loading'})
    .sort(function(a,b){return(a.fields['Stop Number']||0)-(b.fields['Stop Number']||0)});
  if(loadStops.length){
    var html='';
    for(var si=0;si<loadStops.length;si++){
      var sf=loadStops[si].fields;
      var loc=resolveLoc(sf['Location']);
      if(!loc)continue;
      var stopDt=sf['DateTime']||dt;
      html+=buildCard(si+1,loc,'loading',stopDt,sf['Pallets']||'',
        fv(f['Pallet Type']),si===0,sf['Goods']||fv(f['Goods']),
        f['Pallet Exchange']?'YES':'NO',f['Gross Weight kg'],
        sf['Temperature']!=null?sf['Temperature']:f['Temperature °C'],f['Refrigerator Mode']);
    }
    if(html)return html;
  }
  return buildCard(1,{name:'—',address:'',lat:'',lng:''},'loading',dt,
    fv(f['Total Pallets']),fv(f['Pallet Type']),true,fv(f['Goods']),
    f['Pallet Exchange']?'YES':'NO',f['Gross Weight kg'],f['Temperature °C'],f['Refrigerator Mode']);
}

function buildDelHTML(f,isExport,veroiaSwitch,VEROIA,VADDR,VLAT,VLNG){
  var dt=f['Delivery DateTime']||'';
  if(veroiaSwitch&&!isExport){
    var vDt=dt?new Date(new Date(dt).getTime()-86400000).toISOString():'';
    return buildCard(1,{name:VEROIA,address:VADDR,lat:VLAT,lng:VLNG},'delivery',vDt,
      fv(f['Total Pallets']),fv(f['Pallet Type']),false,'','','','','');
  }
  // Try ORDER_STOPS first
  var unloadStops=orderStops.filter(function(r){return r.fields['Stop Type']==='Unloading'})
    .sort(function(a,b){return(a.fields['Stop Number']||0)-(b.fields['Stop Number']||0)});
  if(unloadStops.length){
    var html='';
    for(var si=0;si<unloadStops.length;si++){
      var sf=unloadStops[si].fields;
      var loc=resolveLoc(sf['Location']);
      if(!loc)continue;
      var stopDt=sf['DateTime']||dt;
      html+=buildCard(si+1,loc,'delivery',stopDt,sf['Pallets']||'',
        fv(f['Pallet Type']),false,'','','','','');
    }
    if(html)return html;
  }
  return buildCard(1,{name:'—',address:'',lat:'',lng:''},'delivery',dt,
    fv(f['Total Pallets']),fv(f['Pallet Type']),false,'','','','','');
}

function badges(f){
  var b='';
  if(f['High Risk Flag'])b+='<span class="badge b-risk">! Risk</span>';
  if(f['Pallet Exchange'])b+='<span class="badge b-pe">PE</span>';
  if(f['National Groupage'])b+='<span class="badge b-grp">GRP</span>';
  if(f['Veroia Switch'])b+='<span class="badge b-veroia">Veroia</span>';
  return b;
}

async function loadAll(){
  if(!orderId){document.getElementById('loading').innerHTML='<span style="color:#DC2626">Missing orderId</span>';return;}
  try{
    var[orderR,partners,trucks,trailers,drivers,locs]=await Promise.all([
      atGet(T_ORDERS,orderId),
      atFetch(T_PARTNERS,'&fields[]=Company Name&fields[]=VAT Number&fields[]=Adress&fields[]=Email'),
      atFetch(T_TRUCKS,'&fields[]=License Plate&fields[]=Gross Vehicle Weight kg'),
      atFetch(T_TRAILERS,'&fields[]=License Plate&fields[]=Weight kg'),
      atFetch(T_DRIVERS,'&fields[]=Full Name'),
      atFetch(T_LOCS,'&fields[]=Name&fields[]=Address&fields[]=City&fields[]=State/province&fields[]=Country&fields[]=Latitude&fields[]=Longitude'),
    ]);
    allPartners=partners;allTrucks=trucks;allTrailers=trailers;
    allDrivers=drivers;allLocations=locs;
    // Fetch ORDER_STOPS via reverse-link field
    var stopIds=orderR.fields['ORDER STOPS']||[];
    if(stopIds.length){
      try{
        var stopFilter='OR('+stopIds.map(function(id){return'RECORD_ID()="'+id+'"'}).join(',')+')';
        orderStops=await atFetch(T_STOPS,'&filterByFormula='+encodeURIComponent(stopFilter));
      }catch(e){console.warn('print: ORDER_STOPS fetch failed',e);}
    }
    generatePDF(orderR);
  }catch(err){
    document.getElementById('loading').innerHTML='<span style="color:#DC2626">Error: '+err.message+'</span>';
  }
}

function generatePDF(orderRec){
  var f=orderRec.fields;
  var isExport=leg==='export';
  var legLabel=isExport?'Export':'Import';
  var wk=f['Week Number']||f['Week Number']||'—';
  var rate=eur(f['Partner Rate']);
  var orderNo=f['Order Number']||orderId.slice(-6).toUpperCase();
  var isPartner=!!(f['Is Partner Trip']||(f['Partner']||[]).length);

  // Veroia
  var veroiaSwitch=!!(f['Veroia Switch']);
  var VEROIA='VERMION FRESH / CROSS-DOCK',VADDR='',VLAT='',VLNG='';
  if(f['Veroia Cross-dock']){
    var vl=resolveLoc(f['Veroia Cross-dock']);
    if(vl){VEROIA=vl.name;VADDR=vl.address;VLAT=vl.lat;VLNG=vl.lng;}
  }

  var loadHTML=buildLoadHTML(f,isExport,veroiaSwitch,VEROIA,VADDR,VLAT,VLNG);
  var delHTML=buildDelHTML(f,isExport,veroiaSwitch,VEROIA,VADDR,VLAT,VLNG);
  var badgeHTML=badges(f);
  var notesHTML=f['Notes']?'<div class="notes-box"><b>Notes:</b> '+f['Notes']+'</div>':'';

  var titleStr=(isPartner?'Partner Assignment Order':'Driver Order')+' — '+legLabel+' — W'+wk;
  var pbarHTML='<div class="pbar"><div class="pbar-left">'+
    '<span class="pbar-logo">PETRAS<span> GROUP</span></span>'+
    '<div class="pbar-div"></div>'+
    '<span class="pbar-title">'+titleStr+'</span>'+
    '</div><button class="pbar-btn" onclick="window.print()">Print / PDF</button></div>'+
    '<div class="pbar-spacer"></div>';

  var refNo=f['Reference']||'';
  var metaHTML='<div class="meta">'+
    '<div class="meta-item"><span class="meta-lbl">Date</span><span class="meta-val">'+new Date().toLocaleDateString('el-GR')+'</span></div>'+
    '<div class="meta-item"><span class="meta-lbl">Week</span><span class="meta-val">W'+wk+'</span></div>'+
    '<div class="meta-item"><span class="meta-lbl">Category</span><span class="meta-val">'+legLabel+'</span></div>'+
    '<div class="meta-item"><span class="meta-lbl">Dispatcher</span><span class="meta-val">'+DISPATCHER+'</span></div>'+
    '<div class="meta-item"><span class="meta-lbl">Order No</span><span class="meta-val">'+orderNo+'</span></div>'+
    (refNo?'<div class="meta-item"><span class="meta-lbl">Reference</span><span class="meta-val">'+refNo+'</span></div>':'')+
    (badgeHTML?'<div class="meta-item"><span class="meta-lbl">Flags</span><span class="meta-val">'+badgeHTML+'</span></div>':'')+
    '</div>';

  var html='';

  if(isPartner){
    var partner=allPartners.find(r=>f['Partner']&&r.id===f['Partner'][0])||{};
    var pf=partner.fields||{};
    html=pbarHTML+
    '<div class="doc-header">'+
      '<div>'+
        '<div class="carrier-label">Carrier</div>'+
        '<div class="carrier-name">'+(pf['Company Name']||'—')+'</div>'+
        '<div class="carrier-sub">'+
          (pf['VAT Number']?'VAT: '+pf['VAT Number']+'<br>':'')+
          (pf['Adress']?pf['Adress']+'<br>':'')+
          (pf['Email']||'')+
        '</div>'+
        '<div class="plates-tag">'+(f['Partner Truck Plates']||'—')+'</div>'+
      '</div>'+
      '<div class="brand-wrap">'+
        '<div class="brand">PETRAS<span> GROUP</span></div>'+
        '<div class="brand-sub">International Road Transport Services</div>'+
        '<div class="co-info"><b>VERMION FRESH SA</b><br>Kopanos, Naousa — Imathia, Greece<br>VAT: EL800816168<br>vermionfresh@petrasgroup.com</div>'+
      '</div>'+
    '</div>'+
    '<div class="doc-title">Partner Assignment Order — '+legLabel+' — PAO-W'+wk+'-'+orderNo+'</div>'+
    metaHTML+
    '<div class="price-bar">'+
      '<div><div class="price-lbl">Agreed Rate — '+legLabel+'</div><div class="price-amount">'+rate+'</div></div>'+
      '<div class="price-terms"><div class="price-lbl">Payment Terms</div><div class="val">30 days</div></div>'+
    '</div>'+
    '<div class="section-title">Loading Place</div>'+loadHTML+
    '<div class="section-title">Delivery Place</div>'+delHTML+
    notesHTML+
    '<table class="sig-table"><tr>'+
      '<td><div class="sig-name">PETRAS GROUP / VERMION FRESH SA</div><div class="sig-role">Authorized Signatory</div><div class="sig-line">Signature &amp; Date</div></td>'+
      '<td><div class="sig-name">'+(pf['Company Name']||'CARRIER')+'</div><div class="sig-role">Authorized Signatory</div><div class="sig-line">Signature &amp; Date</div></td>'+
    '</tr></table>';
  }else{
    var driver=allDrivers.find(r=>f['Driver']&&r.id===f['Driver'][0])||{};
    var truck=allTrucks.find(r=>f['Truck']&&r.id===f['Truck'][0])||{};
    var trailer=allTrailers.find(r=>f['Trailer']&&r.id===f['Trailer'][0])||{};
    var df=driver.fields||{},tf=truck.fields||{},trf=trailer.fields||{};
    var truckW=parseFloat(tf['Gross Vehicle Weight kg']||tf['Weight kg']||0);
    var trailerW=parseFloat(trf['Weight kg']||trf['Gross Vehicle Weight kg']||0);
    var totalW=truckW+trailerW;
    html=pbarHTML+
    '<div class="doc-header">'+
      '<div class="brand-wrap" style="text-align:left">'+
        '<div class="brand">PETRAS<span> GROUP</span></div>'+
        '<div class="brand-sub">International Road Transport Services</div>'+
