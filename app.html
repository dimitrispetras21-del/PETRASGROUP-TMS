<!DOCTYPE html>
<html lang="el">
<head>
  <link rel="preconnect" href="https://api.airtable.com">
  <link rel="dns-prefetch" href="https://api.airtable.com">
<meta charset="UTF-8">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Petras Group TMS</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/style.css?v=1774601492">
</head>
<body>

<!-- ═══ SIDEBAR ═══════════════════════════════ -->
<nav class="sidebar" id="sidebar">

  <div class="sidebar-logo">
    <img src="logo.png" alt="Petras Group"
      style="height:84px;filter:brightness(0)invert(1);opacity:0.92;max-width:210px;object-fit:contain;">
  </div>

  <div class="sidebar-nav" id="sidebarNav">
    <!-- Rendered by router.js based on role -->
  </div>

  <div class="sidebar-toggle" onclick="toggleSidebar()" title="Collapse">
    <span id="toggleIcon">◀</span>
  </div>

</nav>

<!-- ═══ MAIN ══════════════════════════════════ -->
<div class="main">

  <!-- Topbar -->
  <div class="topbar">
    <div class="topbar-title" id="topbarTitle">Dashboard</div>
    <div class="topbar-breadcrumb" id="topbarBreadcrumb"></div>
    <div class="topbar-right">
      <div class="notif-wrap" id="notifWrap" style="position:relative;margin-right:8px">
        <button class="notif-bell" onclick="_toggleNotifPanel()" title="Notifications">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 01-3.46 0"/>
          </svg>
          <span class="notif-dot" id="notifDot" style="display:none"></span>
        </button>
        <div class="notif-panel" id="notifPanel" style="display:none"></div>
      </div>
      <div class="user-chip">
        <div class="user-avatar" id="userAvatar">—</div>
        <span id="userName">—</span>
        <span class="role-badge" id="roleBadge">—</span>
      </div>
      <button class="btn-logout" onclick="logout()">Sign out</button>
    </div>
  </div>

  <!-- Content -->
  <div class="content" id="content">
    <div class="loading"><div class="spinner"></div> Loading...</div>
  </div>

</div>

<!-- ═══ MODAL ═════════════════════════════════ -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal" id="modal">
    <div class="modal-header">
      <div class="modal-title" id="modalTitle">—</div>
      <div class="modal-close" onclick="closeModal()">✕</div>
    </div>
    <div class="modal-body" id="modalBody"></div>
    <div class="modal-footer" id="modalFooter"></div>
  </div>
</div>

<!-- ═══ SCRIPTS — load order matters ══════════ -->
<!-- 1. Config (credentials, table IDs, role matrix) -->
<script src="config.js?v=1774973000"></script>
<!-- 2. Core: auth → api → utils → ui → entity → router -->
<script src="core/auth.js?v=1774410000"></script>
<script src="core/api.js?v=1774630000"></script>
<script src="core/utils.js?v=1774601492"></script>
<script src="core/ui.js?v=1774800000"></script>
<script src="core/entity.js?v=1774820000"></script>
<script src="core/router.js?v=1774973000"></script>
<script src="core/ai-chat.js?v=1774603750"></script>
<!-- 3. Modules -->
<script src="modules/dashboard.js?v=1774600690"></script>
<script src="modules/weekly_intl.js?v=1774599153"></script>
<script src="modules/weekly_natl.js?v=1774601988"></script>
  <script src="modules/daily_ramp.js?v=1774599153"></script>
  <script src="modules/maintenance.js?v=1774971000"></script>
  <script src="modules/orders_intl.js?v=1774600690"></script>
<script src="modules/orders_natl.js?v=1774971000"></script>

<script src="modules/locations.js?v=1774610000"></script>
<script src="modules/daily_ops.js?v=1774972000"></script>
<script src="modules/pallet_upload.js?v=1774971000"></script>
<script src="modules/pallet_ledger.js?v=1774971000"></script>
<script src="modules/invoicing.js?v=1774971000"></script>
<script src="modules/performance.js?v=1774604702"></script>

<!-- 4. Init -->
<script>
function init() {
  document.getElementById('userName').textContent   = user.name;
  document.getElementById('userAvatar').textContent = user.name.charAt(0).toUpperCase();
  const rb = document.getElementById('roleBadge');
  rb.textContent = user.role;
  rb.className   = 'role-badge ' + user.role;
  initModal();
  renderNav();
  restoreSidebar();
  navigate(localStorage.getItem('tms_page') || 'dashboard');
}
init();
</script>

</body>
</html>
