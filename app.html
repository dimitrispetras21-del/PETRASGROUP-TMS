<!-- 4. Global error handlers + Init -->
<script>
// Catch uncaught errors and show user-friendly toast instead of raw messages
window.onerror = function(msg, src, line, col, err) {
  if (typeof logError === 'function') logError(err || msg, 'window.onerror ' + (src||'') + ':' + (line||''));
  if (typeof showErrorToast === 'function') {
    showErrorToast('\u039A\u03AC\u03C4\u03B9 \u03C0\u03AE\u03B3\u03B5 \u03C3\u03C4\u03C1\u03B1\u03B2\u03AC. \u0391\u03BD\u03B1\u03BD\u03B5\u03CE\u03C3\u03C4\u03B5 \u03C4\u03B7 \u03C3\u03B5\u03BB\u03AF\u03B4\u03B1.');
  }
  return false;
};
window.addEventListener('unhandledrejection', function(e) {
  if (typeof logError === 'function') logError(e.reason, 'unhandledrejection');
  if (typeof showErrorToast === 'function') {
    showErrorToast('\u039A\u03AC\u03C4\u03B9 \u03C0\u03AE\u03B3\u03B5 \u03C3\u03C4\u03C1\u03B1\u03B2\u03AC. \u0391\u03BD\u03B1\u03BD\u03B5\u03CE\u03C3\u03C4\u03B5 \u03C4\u03B7 \u03C3\u03B5\u03BB\u03AF\u03B4\u03B1.');
  }
});

function init() {
  document.getElementById('userName').textContent   = user.name;
  document.getElementById('userAvatar').textContent = user.name.charAt(0).toUpperCase();
  const rb = document.getElementById('roleBadge');
  rb.textContent = user.role;
  rb.className   = 'role-badge ' + user.role;
  initModal();
  renderNav();
  restoreSidebar();
  navigate(localStorage.getItem('tms_page') || 'dashboard');
  atPresenceStart(); // Multi-user presence tracking
}
init();

// Register Service Worker for offline mode + auto-update
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').then(reg => {
    // Check for updates every 30 minutes
    setInterval(() => reg.update(), 30 * 60 * 1000);
    // When a new SW is waiting, tell it to activate immediately
    reg.addEventListener('updatefound', () => {
      const nw = reg.installing;
      if (!nw) return;
      nw.addEventListener('statechange', () => {
        if (nw.state === 'installed' && navigator.serviceWorker.controller) {
          nw.postMessage({ type: 'SKIP_WAITING' });
        }
      });
    });
  }).catch(() => {});

  // Listen for SW messages (offline/online notifications)
  navigator.serviceWorker.addEventListener('message', e => {
    const ob = document.getElementById('offlineBanner');
    if (!ob) return;
    if (e.data.type === 'SW_OFFLINE') ob.classList.add('show');
    if (e.data.type === 'SW_ONLINE')  { ob.classList.remove('show'); _hideCacheAgeBanner(); }
    if (e.data.type === 'SW_ACTIVATED') {
      console.log('[SW] Activated version:', e.data.version);
    }
    if (e.data.type === 'SW_CACHE_AGE' && e.data.ageMs) {
      _showCacheAgeBanner(e.data.ageMs);
    }
  });

  // Cache age banner helpers
  function _showCacheAgeBanner(ageMs) {
    let banner = document.getElementById('cacheAgeBanner');
    if (!banner) {
      banner = document.createElement('div');
      banner.id = 'cacheAgeBanner';
      banner.style.cssText = 'position:fixed;top:0;left:0;right:0;z-index:99998;background:#92400E;color:#fff;text-align:center;padding:6px 12px;font:12px/1.4 "DM Sans",sans-serif;transition:opacity .3s;';
      document.body.appendChild(banner);
    }
    const mins = Math.round(ageMs / 60000);
    const label = mins < 1 ? 'less than 1 min' : mins < 60 ? `${mins} min` : `${Math.round(mins/60)}h`;
    banner.textContent = `Offline \u2014 data from ${label} ago`;
    banner.style.opacity = '1';
    banner.style.display = 'block';
  }
  function _hideCacheAgeBanner() {
    const banner = document.getElementById('cacheAgeBanner');
    if (banner) { banner.style.opacity = '0'; setTimeout(() => { if (banner) banner.style.display = 'none'; }, 300); }
  }

  // Reload when new SW takes control (seamless update)
  let refreshing = false;
  navigator.serviceWorker.addEventListener('controllerchange', () => {
    if (refreshing) return;
    refreshing = true;
    window.location.reload();
  });
}
</script>

<div class="offline-banner" id="offlineBanner">Offline Mode — data may not be current</div>
<script>
const _ob = document.getElementById('offlineBanner');
window.addEventListener('offline', () => _ob.classList.add('show'));
window.addEventListener('online',  () => _ob.classList.remove('show'));
if (!navigator.onLine) _ob.classList.add('show');
</script>
