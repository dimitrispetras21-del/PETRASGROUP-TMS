<!DOCTYPE html>
<html lang="el">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Petras Group TMS</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --navy:      #091828;
    --navy-mid:  #0D2140;
    --navy-card: #0F2545;
    --silver:    #B8C4D0;
    --silver-dim:#6A7D90;
    --white:     #EEF2F7;
    --border:    rgba(184,196,208,0.15);
    --border-foc:rgba(184,196,208,0.45);
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--navy);
    min-height: 100vh;
    display: flex;
    overflow: hidden;
  }

  /* Subtle grid */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image:
      linear-gradient(rgba(184,196,208,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(184,196,208,0.03) 1px, transparent 1px);
    background-size: 52px 52px;
    pointer-events: none;
    z-index: 0;
  }

  /* ── LEFT PANEL ─────────────────────────── */
  .left-panel {
    position: relative;
    z-index: 1;
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    padding: 52px 60px 48px;
    overflow: hidden;
  }

  /* Truck photo as contained graphic — bottom right of left panel */
  .truck-graphic {
    position: absolute;
    bottom: 0;
    right: -40px;
    width: 72%;
    aspect-ratio: 16/9;
    border-radius: 16px 0 0 0;
    overflow: hidden;
    opacity: 0.55;
    mask-image: linear-gradient(to top, rgba(0,0,0,0.9) 60%, transparent 100%),
                linear-gradient(to right, transparent 0%, rgba(0,0,0,1) 30%);
    -webkit-mask-image: linear-gradient(to top, rgba(0,0,0,0.9) 60%, transparent 100%);
  }

  .truck-graphic img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center center;
  }

  .brand-logo {
    position: relative;
    z-index: 2;
  }

  .brand-logo img {
    height: 40px;
    filter: brightness(0) invert(1);
    opacity: 0.92;
  }

  .brand-tagline {
    position: relative;
    z-index: 2;
    max-width: 480px;
  }

  .brand-tagline h1 {
    font-family: 'Syne', sans-serif;
    font-size: 50px;
    font-weight: 800;
    line-height: 1.1;
    color: var(--white);
    letter-spacing: -1px;
  }

  .brand-tagline h1 .line2 {
    font-weight: 300;
    color: var(--silver);
    display: block;
  }

  .brand-tagline h1 .line3 {
    font-weight: 300;
    color: var(--silver);
    display: block;
    letter-spacing: 6px;
    font-size: 32px;
    margin-top: 4px;
  }

  .brand-tagline p {
    margin-top: 20px;
    font-size: 14px;
    color: var(--silver-dim);
    font-weight: 300;
    line-height: 1.7;
  }

  .brand-footer {
    position: relative;
    z-index: 2;
    font-size: 10px;
    color: rgba(106,125,144,0.5);
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  /* ── RIGHT PANEL ────────────────────────── */
  .right-panel {
    position: relative;
    z-index: 2;
    width: 420px;
    flex-shrink: 0;
    background: var(--navy-card);
    border-left: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 52px 44px;
  }

  .right-panel::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, rgba(184,196,208,0.35), transparent);
  }

  .form-wrap {
    width: 100%;
    animation: slideIn 0.5s cubic-bezier(0.22,1,0.36,1);
  }

  @keyframes slideIn {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .form-logo {
    text-align: center;
    margin-bottom: 36px;
  }

  .form-logo img {
    height: 34px;
    filter: brightness(0) invert(1);
    opacity: 0.8;
  }

  .form-title {
    font-family: 'Syne', sans-serif;
    font-size: 22px;
    font-weight: 700;
    color: var(--white);
    text-align: center;
    margin-bottom: 6px;
  }

  .form-sub {
    font-size: 13px;
    color: var(--silver-dim);
    font-weight: 300;
    text-align: center;
    margin-bottom: 36px;
  }

  .field-group { margin-bottom: 18px; }

  label {
    display: block;
    font-size: 10px;
    font-weight: 500;
    color: var(--silver-dim);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  input {
    width: 100%;
    background: rgba(255,255,255,0.04);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 13px 16px;
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    color: var(--white);
    outline: none;
    transition: border-color 0.2s, background 0.2s;
  }

  input:focus {
    border-color: var(--border-foc);
    background: rgba(184,196,208,0.06);
  }

  input::placeholder { color: rgba(106,125,144,0.5); }

  .btn-login {
    width: 100%;
    margin-top: 28px;
    padding: 14px;
    background: linear-gradient(135deg, #1A4068, #0D2F55);
    border: 1px solid rgba(184,196,208,0.25);
    border-radius: 8px;
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 12px;
    letter-spacing: 2.5px;
    text-transform: uppercase;
    color: #D6DDE5;
    cursor: pointer;
    transition: all 0.2s;
    box-shadow: 0 4px 20px rgba(0,0,0,0.3);
  }

  .btn-login:hover {
    background: linear-gradient(135deg, #235080, #1A3D68);
    border-color: rgba(184,196,208,0.45);
    color: var(--white);
    transform: translateY(-1px);
  }

  .btn-login:active { transform: translateY(0); }

  .error-msg {
    display: none;
    margin-top: 14px;
    padding: 11px 14px;
    background: rgba(201,64,64,0.1);
    border: 1px solid rgba(201,64,64,0.25);
    border-radius: 7px;
    color: #E88;
    font-size: 13px;
    text-align: center;
  }

  .form-version {
    text-align: center;
    margin-top: 32px;
    font-size: 10px;
    color: rgba(106,125,144,0.3);
    letter-spacing: 1.5px;
    text-transform: uppercase;
  }

  @media (max-width: 768px) {
    .left-panel { display: none; }
    .right-panel { width: 100%; border-left: none; }
  }
</style>
</head>
<body>

<!-- LEFT BRANDING -->
<div class="left-panel">
  <div class="brand-logo">
    <img src="logo.jpg" alt="Petras Group">
  </div>

  <div class="brand-tagline">
    <h1>
      Transport
      <span class="line2">Management</span>
      <span class="line3">SYSTEM</span>
    </h1>
    <p>Πλήρης διαχείριση διεθνών δρομολογίων,<br>στόλου και κόστους για την Petras Group.</p>
  </div>

  <div class="brand-footer">
    Petras Group · International Road Transport Services
  </div>

  <!-- Truck photo as graphic -->
  <div class="truck-graphic">
    <img src="truck.jpg" alt="">
  </div>
</div>

<!-- RIGHT LOGIN -->
<div class="right-panel">
  <div class="form-wrap">
    <div class="form-logo">
      <img src="logo.jpg" alt="Petras Group">
    </div>

    <div class="form-title">Καλώς ήρθατε</div>
    <div class="form-sub">Συνδεθείτε για πρόσβαση στο σύστημα</div>

    <div class="field-group">
      <label>Username</label>
      <input type="text" id="username" placeholder="Εισάγετε username" autocomplete="username">
    </div>

    <div class="field-group">
      <label>Password</label>
      <input type="password" id="password" placeholder="••••••••" autocomplete="current-password">
    </div>

    <button class="btn-login" onclick="doLogin()">Είσοδος →</button>
    <div class="error-msg" id="errMsg">Λάθος username ή password</div>
    <div class="form-version">v1.0 · Petras Group TMS · 2026</div>
  </div>
</div>

<script>
const USERS = [
  { username: 'dimitris',   password: 'petras2024',  role: 'owner',      name: 'Δημήτρης Πέτρας' },
  { username: 'dispatcher', password: 'dispatch24',  role: 'dispatcher', name: 'Dispatcher' },
  { username: 'management', password: 'manage24',    role: 'management', name: 'Management' },
  { username: 'accountant', password: 'account24',   role: 'accountant', name: 'Accountant' },
];

function doLogin() {
  const u = document.getElementById('username').value.trim().toLowerCase();
  const p = document.getElementById('password').value;
  const user = USERS.find(x => x.username === u && x.password === p);
  if (user) {
    sessionStorage.setItem('tms_user', JSON.stringify(user));
    window.location.href = 'app.html';
  } else {
    const err = document.getElementById('errMsg');
    err.style.display = 'block';
    setTimeout(() => err.style.display = 'none', 3000);
  }
}

document.addEventListener('keydown', e => { if(e.key === 'Enter') doLogin(); });
if(sessionStorage.getItem('tms_user')) window.location.href = 'app.html';
</script>
</body>
</html>
