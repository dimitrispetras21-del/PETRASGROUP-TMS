<!DOCTYPE html>
<html lang="el">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Petras Group TMS</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --navy:       #0B1E35;
    --navy-panel: rgba(10, 22, 42, 0.92);
    --silver:     #B8C4D0;
    --silver-dim: #7A8A9A;
    --white:      #EEF2F7;
    --border:     rgba(184,196,208,0.18);
    --border-foc: rgba(184,196,208,0.5);
  }

  body {
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    display: flex;
    overflow: hidden;
    position: relative;
  }

  /* Full-bleed truck photo */
  .bg-photo {
    position: fixed;
    inset: 0;
    background: url('truck.jpg') center center / cover no-repeat;
    z-index: 0;
  }

  /* Dark overlay on photo */
  .bg-photo::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(
      100deg,
      rgba(8,18,34,0.82) 0%,
      rgba(8,18,34,0.55) 50%,
      rgba(8,18,34,0.75) 100%
    );
  }

  /* Left branding */
  .left-panel {
    position: relative;
    z-index: 2;
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    padding: 52px 60px;
  }

  .brand-logo img {
    height: 44px;
    /* logo is dark — invert to white */
    filter: brightness(0) invert(1);
    opacity: 0.95;
  }

  .brand-tagline {
    max-width: 420px;
  }

  .brand-tagline h1 {
    font-family: 'Syne', sans-serif;
    font-size: 52px;
    font-weight: 800;
    line-height: 1.1;
    color: var(--white);
    letter-spacing: -1px;
  }

  .brand-tagline h1 .light {
    font-weight: 400;
    color: var(--silver);
  }

  .brand-tagline h1 .tms {
    font-weight: 400;
    font-style: normal;
    color: var(--silver);
    letter-spacing: 2px;
    font-size: 44px;
  }

  .brand-tagline p {
    margin-top: 18px;
    font-size: 15px;
    color: rgba(184,196,208,0.75);
    font-weight: 300;
    line-height: 1.65;
    max-width: 360px;
  }

  .brand-footer {
    font-size: 11px;
    color: rgba(184,196,208,0.35);
    letter-spacing: 1.5px;
    text-transform: uppercase;
  }

  /* Right login panel */
  .right-panel {
    position: relative;
    z-index: 2;
    width: 420px;
    flex-shrink: 0;
    background: var(--navy-panel);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-left: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 52px 44px;
  }

  /* Top silver line accent */
  .right-panel::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, rgba(184,196,208,0.4), transparent);
  }

  .form-wrap {
    width: 100%;
    animation: slideIn 0.5s cubic-bezier(0.22,1,0.36,1);
  }

  @keyframes slideIn {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .form-logo {
    margin-bottom: 36px;
    text-align: center;
  }

  .form-logo img {
    height: 36px;
    filter: brightness(0) invert(1);
    opacity: 0.8;
  }

  .form-title {
    font-family: 'Syne', sans-serif;
    font-size: 22px;
    font-weight: 700;
    color: var(--white);
    margin-bottom: 6px;
    text-align: center;
  }

  .form-sub {
    font-size: 13px;
    color: var(--silver-dim);
    font-weight: 300;
    text-align: center;
    margin-bottom: 36px;
  }

  .field-group { margin-bottom: 18px; }

  label {
    display: block;
    font-size: 10px;
    font-weight: 500;
    color: var(--silver-dim);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  input {
    width: 100%;
    background: rgba(255,255,255,0.05);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 13px 16px;
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    color: var(--white);
    outline: none;
    transition: border-color 0.2s, background 0.2s;
  }

  input:focus {
    border-color: var(--border-foc);
    background: rgba(184,196,208,0.07);
  }

  input::placeholder { color: rgba(122,138,154,0.5); }

  .btn-login {
    width: 100%;
    margin-top: 28px;
    padding: 14px;
    background: linear-gradient(135deg, #1A4068, #0D2F55);
    border: 1px solid rgba(184,196,208,0.3);
    border-radius: 8px;
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 12px;
    letter-spacing: 2.5px;
    text-transform: uppercase;
    color: var(--silver-light, #D6DDE5);
    cursor: pointer;
    transition: all 0.2s;
    box-shadow: 0 4px 20px rgba(0,0,0,0.3);
  }

  .btn-login:hover {
    background: linear-gradient(135deg, #235080, #1A3D68);
    border-color: rgba(184,196,208,0.5);
    color: var(--white);
    transform: translateY(-1px);
    box-shadow: 0 8px 28px rgba(0,0,0,0.4);
  }

  .btn-login:active { transform: translateY(0); }

  .error-msg {
    display: none;
    margin-top: 14px;
    padding: 11px 14px;
    background: rgba(201,64,64,0.1);
    border: 1px solid rgba(201,64,64,0.3);
    border-radius: 7px;
    color: #E88;
    font-size: 13px;
    text-align: center;
  }

  .form-version {
    text-align: center;
    margin-top: 32px;
    font-size: 10px;
    color: rgba(122,138,154,0.35);
    letter-spacing: 1.5px;
    text-transform: uppercase;
  }

  @media (max-width: 768px) {
    .left-panel { display: none; }
    .right-panel { width: 100%; border-left: none; }
  }
</style>
</head>
<body>

<div class="bg-photo"></div>

<!-- LEFT BRANDING -->
<div class="left-panel">
  <div class="brand-logo">
    <img src="logo.jpg" alt="Petras Group">
  </div>

  <div class="brand-tagline">
    <h1>
      Transport<br>
      <span class="light">Management</span><br>
      <span class="tms">SYSTEM</span>
    </h1>
    <p>Πλήρης διαχείριση διεθνών δρομολογίων, στόλου και κόστους για την Petras Group.</p>
  </div>

  <div class="brand-footer">
    Petras Group · International Road Transport Services
  </div>
</div>

<!-- RIGHT LOGIN -->
<div class="right-panel">
  <div class="form-wrap">

    <div class="form-logo">
      <img src="logo.jpg" alt="Petras Group">
    </div>

    <div class="form-title">Καλώς ήρθατε</div>
    <div class="form-sub">Συνδεθείτε για πρόσβαση στο σύστημα</div>

    <div class="field-group">
      <label>Username</label>
      <input type="text" id="username" placeholder="Εισάγετε username" autocomplete="username">
    </div>

    <div class="field-group">
      <label>Password</label>
      <input type="password" id="password" placeholder="••••••••" autocomplete="current-password">
    </div>

    <button class="btn-login" onclick="doLogin()">Είσοδος →</button>
    <div class="error-msg" id="errMsg">Λάθος username ή password</div>

    <div class="form-version">v1.0 · Petras Group TMS · 2026</div>
  </div>
</div>

<script>
const USERS = [
  { username: 'dimitris',   password: 'petras2024',  role: 'owner',      name: 'Δημήτρης Πέτρας' },
  { username: 'dispatcher', password: 'dispatch24',  role: 'dispatcher', name: 'Dispatcher' },
  { username: 'management', password: 'manage24',    role: 'management', name: 'Management' },
  { username: 'accountant', password: 'account24',   role: 'accountant', name: 'Accountant' },
];

function doLogin() {
  const u = document.getElementById('username').value.trim().toLowerCase();
  const p = document.getElementById('password').value;
  const user = USERS.find(x => x.username === u && x.password === p);
  if (user) {
    sessionStorage.setItem('tms_user', JSON.stringify(user));
    window.location.href = 'app.html';
  } else {
    const err = document.getElementById('errMsg');
    err.style.display = 'block';
    setTimeout(() => err.style.display = 'none', 3000);
  }
}

document.addEventListener('keydown', e => { if(e.key === 'Enter') doLogin(); });
if(sessionStorage.getItem('tms_user')) window.location.href = 'app.html';
</script>
</body>
</html>
