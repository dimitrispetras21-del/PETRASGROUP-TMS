<!DOCTYPE html>
<html lang="el">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Petras Group TMS</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --navy: #0B1628;
    --navy-mid: #132040;
    --navy-light: #1E3058;
    --gold: #F4A535;
    --gold-dim: #C4832A;
    --white: #F0F4FF;
    --muted: #6B7FA3;
    --danger: #E63946;
    --success: #2EC4B6;
    --border: rgba(244,165,53,0.15);
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--navy);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
  }

  /* Background grid */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(244,165,53,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(244,165,53,0.04) 1px, transparent 1px);
    background-size: 48px 48px;
    pointer-events: none;
  }

  /* Glow orbs */
  .orb {
    position: fixed;
    border-radius: 50%;
    filter: blur(80px);
    pointer-events: none;
    opacity: 0.35;
  }
  .orb-1 { width: 500px; height: 500px; background: #1E3A6E; top: -100px; left: -100px; }
  .orb-2 { width: 400px; height: 400px; background: #F4A53520; bottom: -80px; right: -80px; }

  .login-card {
    position: relative;
    z-index: 10;
    width: 420px;
    background: linear-gradient(145deg, #132040, #0F1E38);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 48px 44px;
    box-shadow: 0 40px 80px rgba(0,0,0,0.5), inset 0 1px 0 rgba(244,165,53,0.1);
    animation: cardIn 0.6s cubic-bezier(0.22,1,0.36,1) forwards;
  }

  @keyframes cardIn {
    from { opacity: 0; transform: translateY(24px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .logo-area {
    text-align: center;
    margin-bottom: 40px;
  }

  .logo-badge {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 56px; height: 56px;
    background: linear-gradient(135deg, var(--gold), var(--gold-dim));
    border-radius: 14px;
    margin-bottom: 16px;
    box-shadow: 0 8px 24px rgba(244,165,53,0.3);
  }

  .logo-badge svg { width: 28px; height: 28px; fill: var(--navy); }

  .logo-name {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 20px;
    color: var(--white);
    letter-spacing: 0.5px;
  }

  .logo-sub {
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-top: 4px;
  }

  .field-group { margin-bottom: 20px; }

  label {
    display: block;
    font-size: 11px;
    font-weight: 500;
    color: var(--muted);
    letter-spacing: 1.5px;
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  input {
    width: 100%;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(244,165,53,0.15);
    border-radius: 10px;
    padding: 13px 16px;
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    color: var(--white);
    outline: none;
    transition: border-color 0.2s, background 0.2s;
  }

  input:focus {
    border-color: var(--gold);
    background: rgba(244,165,53,0.06);
  }

  input::placeholder { color: var(--muted); }

  .btn-login {
    width: 100%;
    margin-top: 28px;
    padding: 14px;
    background: linear-gradient(135deg, var(--gold), var(--gold-dim));
    border: none;
    border-radius: 10px;
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 14px;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--navy);
    cursor: pointer;
    transition: opacity 0.2s, transform 0.1s;
    box-shadow: 0 8px 24px rgba(244,165,53,0.25);
  }

  .btn-login:hover { opacity: 0.9; transform: translateY(-1px); }
  .btn-login:active { transform: translateY(0); }

  .error-msg {
    display: none;
    margin-top: 14px;
    padding: 11px 14px;
    background: rgba(230,57,70,0.12);
    border: 1px solid rgba(230,57,70,0.3);
    border-radius: 8px;
    color: #FF6B75;
    font-size: 13px;
    text-align: center;
  }

  .version {
    text-align: center;
    margin-top: 32px;
    font-size: 11px;
    color: rgba(107,127,163,0.5);
    letter-spacing: 1px;
  }
</style>
</head>
<body>
<div class="orb orb-1"></div>
<div class="orb orb-2"></div>

<div class="login-card">
  <div class="logo-area">
    <div class="logo-badge">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M20 8h-3V4H3c-1.1 0-2 .9-2 2v11h2c0 1.66 1.34 3 3 3s3-1.34 3-3h6c0 1.66 1.34 3 3 3s3-1.34 3-3h2v-5l-3-4zM6 18.5c-.83 0-1.5-.67-1.5-1.5s.67-1.5 1.5-1.5 1.5.67 1.5 1.5-.67 1.5-1.5 1.5zm13.5-9l1.96 2.5H17V9.5h2.5zm-1.5 9c-.83 0-1.5-.67-1.5-1.5s.67-1.5 1.5-1.5 1.5.67 1.5 1.5-.67 1.5-1.5 1.5z"/>
      </svg>
    </div>
    <div class="logo-name">PETRAS GROUP</div>
    <div class="logo-sub">Transport Management System</div>
  </div>

  <div class="field-group">
    <label>Username</label>
    <input type="text" id="username" placeholder="Εισάγετε username" autocomplete="username">
  </div>

  <div class="field-group">
    <label>Password</label>
    <input type="password" id="password" placeholder="••••••••" autocomplete="current-password">
  </div>

  <button class="btn-login" onclick="doLogin()">Είσοδος</button>
  <div class="error-msg" id="errMsg">Λάθος username ή password</div>

  <div class="version">v1.0 · Petras Group TMS</div>
</div>

<script>
// ── USERS CONFIG ─────────────────────────────────────────────────────────────
// Role: owner | dispatcher | management | accountant
const USERS = [
  { username: 'dimitris',    password: 'petras2024',  role: 'owner',      name: 'Δημήτρης Πέτρας' },
  { username: 'dispatcher',  password: 'dispatch24',  role: 'dispatcher', name: 'Dispatcher' },
  { username: 'management',  password: 'manage24',    role: 'management', name: 'Management' },
  { username: 'accountant',  password: 'account24',   role: 'accountant', name: 'Accountant' },
];

function doLogin() {
  const u = document.getElementById('username').value.trim().toLowerCase();
  const p = document.getElementById('password').value;
  const user = USERS.find(x => x.username === u && x.password === p);
  if (user) {
    sessionStorage.setItem('tms_user', JSON.stringify(user));
    window.location.href = 'app.html';
  } else {
    const err = document.getElementById('errMsg');
    err.style.display = 'block';
    setTimeout(() => err.style.display = 'none', 3000);
  }
}

// Enter key
document.addEventListener('keydown', e => { if(e.key === 'Enter') doLogin(); });

// Redirect if already logged in
if(sessionStorage.getItem('tms_user')) window.location.href = 'app.html';
</script>
</body>
</html>
