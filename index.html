<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Petras Group TMS</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@300;400;500;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --navy:      #091828;
    --navy-card: #0F2545;
    --silver:    #B8C4D0;
    --silver-dim:#6A7D90;
    --white:     #EEF2F7;
    --border:    rgba(184,196,208,0.15);
    --border-foc:rgba(184,196,208,0.45);
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--navy);
    min-height: 100vh;
    display: flex;
    overflow: hidden;
  }

  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image:
      linear-gradient(rgba(184,196,208,0.025) 1px, transparent 1px),
      linear-gradient(90deg, rgba(184,196,208,0.025) 1px, transparent 1px);
    background-size: 52px 52px;
    pointer-events: none;
    z-index: 0;
  }

  .left-panel {
    position: relative;
    z-index: 1;
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    padding: 52px 60px 48px;
    overflow: hidden;
  }

  .truck-graphic {
    position: absolute;
    bottom: 0;
    right: -20px;
    width: 68%;
    border-radius: 16px 0 0 0;
    overflow: hidden;
    opacity: 0.5;
  }

  .truck-graphic img {
    width: 100%;
    height: auto;
    display: block;
    object-position: center center;
  }

  .truck-graphic::after {
    content: '';
    position: absolute;
    inset: 0;
    background:
      linear-gradient(to top, var(--navy) 0%, transparent 50%),
      linear-gradient(to right, var(--navy) 0%, transparent 30%);
  }

  .brand-logo {
    position: relative;
    z-index: 3;
  }

  .brand-logo img {
    height: 114px;
    filter: brightness(0) invert(1);
    opacity: 0.9;
  }

  .brand-tagline {
    position: relative;
    z-index: 3;
    max-width: 480px;
  }

  .brand-tagline h1 {
    font-family: 'Syne', sans-serif;
    font-size: 48px;
    font-weight: 400;
    line-height: 1.15;
    color: var(--silver);
    letter-spacing: 1px;
  }

  .brand-tagline p {
    margin-top: 18px;
    font-size: 14px;
    color: var(--silver-dim);
    font-weight: 300;
    line-height: 1.7;
  }

  .brand-footer {
    position: relative;
    z-index: 3;
    font-size: 10px;
    color: rgba(106,125,144,0.4);
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  .right-panel {
    position: relative;
    z-index: 2;
    width: 420px;
    flex-shrink: 0;
    background: var(--navy-card);
    border-left: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 52px 44px;
  }

  .right-panel::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, rgba(184,196,208,0.3), transparent);
  }

  .form-wrap {
    width: 100%;
    animation: slideIn 0.5s cubic-bezier(0.22,1,0.36,1);
  }

  @keyframes slideIn {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .form-logo {
    text-align: center;
    margin-bottom: 36px;
  }

  .form-logo img {
    height: 96px;
    filter: brightness(0) invert(1);
    opacity: 0.75;
  }

  .form-title {
    font-family: 'Syne', sans-serif;
    font-size: 22px;
    font-weight: 700;
    color: var(--white);
    text-align: center;
    margin-bottom: 6px;
  }

  .form-sub {
    font-size: 13px;
    color: var(--silver-dim);
    font-weight: 300;
    text-align: center;
    margin-bottom: 36px;
  }

  .field-group { margin-bottom: 18px; }

  label {
    display: block;
    font-size: 10px;
    font-weight: 500;
    color: var(--silver-dim);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  input {
    width: 100%;
    background: rgba(255,255,255,0.04);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 13px 16px;
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    color: var(--white);
    outline: none;
    transition: border-color 0.2s, background 0.2s;
  }

  input:focus {
    border-color: var(--border-foc);
    background: rgba(184,196,208,0.06);
  }

  input::placeholder { color: rgba(106,125,144,0.5); }

  .btn-login {
    width: 100%;
    margin-top: 28px;
    padding: 14px;
    background: linear-gradient(135deg, #1A4068, #0D2F55);
    border: 1px solid rgba(184,196,208,0.25);
    border-radius: 8px;
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 12px;
    letter-spacing: 2.5px;
    text-transform: uppercase;
    color: #D6DDE5;
    cursor: pointer;
    transition: all 0.2s;
  }

  .btn-login:hover {
    background: linear-gradient(135deg, #235080, #1A3D68);
    border-color: rgba(184,196,208,0.45);
    color: var(--white);
    transform: translateY(-1px);
  }

  .btn-login:active { transform: translateY(0); }

  .error-msg {
    display: none;
    margin-top: 14px;
    padding: 11px 14px;
    background: rgba(201,64,64,0.1);
    border: 1px solid rgba(201,64,64,0.25);
    border-radius: 7px;
    color: #E88;
    font-size: 13px;
    text-align: center;
  }

  .form-version {
    text-align: center;
    margin-top: 32px;
    font-size: 10px;
    color: rgba(106,125,144,0.3);
    letter-spacing: 1.5px;
    text-transform: uppercase;
  }

  @media (max-width: 768px) {
    .left-panel { display: none; }
    .right-panel { width: 100%; border-left: none; }
  }
</style>
</head>
<body>

<div class="left-panel">
  <div class="brand-logo">
    <img src="logo.png" alt="Petras Group">
  </div>

  <div class="truck-graphic">
    <img src="truck.jpg" alt="Petras Group Truck">
  </div>

  <div class="brand-tagline">
    <h1>Transport<br>Management<br>System</h1>
    <p>Full management of international routes,<br>fleet and costs for Petras Group.</p>
  </div>

  <div class="brand-footer">
    Petras Group · International Road Transport Services
  </div>
</div>

<div class="right-panel">
  <div class="form-wrap">
    <div class="form-logo">
      <img src="logo.png" alt="Petras Group">
    </div>

    <div class="form-title">Welcome</div>
    <div class="form-sub">Sign in to access the system</div>

    <div class="field-group">
      <label>Username</label>
      <input type="text" id="username" placeholder="Enter username" autocomplete="username">
    </div>

    <div class="field-group">
      <label>Password</label>
      <input type="password" id="password" placeholder="••••••••" autocomplete="current-password">
    </div>

    <button class="btn-login" onclick="doLogin()">Sign In →</button>
    <div class="error-msg" id="errMsg">Incorrect username or password</div>
    <div class="form-version">v1.0 · Petras Group TMS · 2026</div>
  </div>
</div>

<script>
// ── API Mode (must match config.js) ──
const USE_PROXY  = false;
const PROXY_URL  = 'https://tms-api-proxy.petrasgroup.workers.dev';

// Passwords stored as SHA-256 hashes only — never plaintext in source
const USERS = [
  { username: 'dimitris',   hash: 'b7e480feeff4e9f28cde7b5f10c8b46d4e81eac0f44fc91d9b6ca20648dc75ca', role: 'owner',      name: 'Dimitris Petras' },
  { username: 'pantelis',   hash: 'fa1db14f60e798c8f3c582586fd7d4c70cf8431249ffc7787befa93e6dbfd215', role: 'dispatcher', name: 'Pantelis Tsanaktsidis' },
  { username: 'sotiris',    hash: 'a5b2ee26884135591d0c8213b30802060d379074e151c08d8bc07757aea77ead', role: 'dispatcher', name: 'Sotiris Koulouriotis' },
  { username: 'thodoris',   hash: '699d7aab30ff342aa3656f63b1b72b6fcfa83ca26fa75313ec89a4b7d5fc0c10', role: 'management', name: 'Thodoris Vainas' },
  { username: 'eirini',     hash: '172f322617cd908a2cefceab73f655b875f9f4c55cbc37d129f9072aee57512a', role: 'accountant', name: 'Eirini Papazoi' },
  { username: 'kelesmitos', hash: '00ad77798c78b32aecb433e682eabecae8338ed965dafebb4d31a697974a892a', role: 'dispatcher', name: 'Dimitris Kelesmitos' },
];

const SESSION_TTL = 8 * 60 * 60 * 1000; // 8 hours

async function sha256(text) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(text));
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, '0')).join('');
}

// Per-user-salted SHA-256 — prevents rainbow-table attacks AND identical
// passwords across users producing identical hashes.
// To migrate: once each user logs in, the salted hash is printed to console
// so the admin can paste it into config.js/index.html as `saltedHash`.
async function sha256Salted(username, password) {
  return sha256((username || '').toLowerCase() + ':tms:' + password);
}

function showError(msg) {
  const err = document.getElementById('errMsg');
  err.textContent = msg || 'Incorrect username or password';
  err.style.display = 'block';
  setTimeout(() => err.style.display = 'none', 3000);
}

async function doLogin() {
  const u = document.getElementById('username').value.trim().toLowerCase();
  const p = document.getElementById('password').value;
  const inputHash = await sha256(p);

  if (USE_PROXY) {
    // ── Proxy mode: authenticate via Cloudflare Worker ──
    try {
      const res = await fetch(`${PROXY_URL}/auth/login`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username: u, passwordHash: inputHash }),
      });
      const data = await res.json();
      if (!res.ok) {
        showError(data.error || 'Login failed');
        return;
      }
      // Store JWT token
      localStorage.setItem('tms_jwt', data.token);
      // Store session (same shape as client-side auth)
      const session = {
        name: data.name,
        role: data.role,
        username: data.username,
        loginAt: Date.now(),
        expiresAt: data.expiresAt,
      };
      localStorage.setItem('tms_user', JSON.stringify(session));
      window.location.href = 'app.html';
    } catch (e) {
      showError('Connection error — try again');
    }
  } else {
    // ── Direct mode: client-side hash comparison ──
    // Dual-hash support (migration path):
    //   1. Try saltedHash (new format): SHA-256(username:tms:password)
    //   2. Fall back to legacy hash: SHA-256(password)
    // On legacy match, log the new saltedHash so admin can upgrade config.js.
    const saltedInput = await sha256Salted(u, p);
    let user = USERS.find(x => x.username === u && x.saltedHash && x.saltedHash === saltedInput);
    let usedLegacy = false;
    if (!user) {
      user = USERS.find(x => x.username === u && x.hash === inputHash);
      if (user) usedLegacy = true;
    }
    if (user) {
      if (usedLegacy) {
        console.info(
          '[SECURITY] User "%s" authenticated with legacy hash. ' +
          'Add this line to the USERS array to enable per-user salting:\n' +
          '  saltedHash: "%s"',
          u, saltedInput
        );
      }
      const session = {
        name: user.name,
        role: user.role,
        username: user.username,
        loginAt: Date.now(),
        expiresAt: Date.now() + SESSION_TTL
      };
      localStorage.setItem('tms_user', JSON.stringify(session));
      window.location.href = 'app.html';
    } else {
      showError();
    }
  }
}

document.addEventListener('keydown', e => { if(e.key === 'Enter') doLogin(); });

// Check existing session: auto-login if valid, expire if stale
const existing = JSON.parse(localStorage.getItem('tms_user') || 'null');
if (existing && existing.expiresAt && Date.now() < existing.expiresAt) {
  window.location.href = 'app.html';
} else if (existing) {
  localStorage.removeItem('tms_user');
  localStorage.removeItem('tms_jwt');
}
</script>
</body>
</html>
