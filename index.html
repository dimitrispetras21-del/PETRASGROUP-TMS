<!DOCTYPE html>
<html lang="el">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Petras Group TMS</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --volvo-dark:    #0D1F35;
    --volvo-navy:    #003057;
    --volvo-mid:     #0A2744;
    --silver:        #B8C4D0;
    --silver-light:  #D6DDE5;
    --silver-dim:    #7A8A9A;
    --white:         #EEF2F7;
    --border:        rgba(184,196,208,0.15);
    --border-focus:  rgba(184,196,208,0.45);
    --danger:        #C94040;
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--volvo-dark);
    min-height: 100vh;
    display: flex;
    align-items: stretch;
    overflow: hidden;
  }

  /* Left panel — branding */
  .left-panel {
    flex: 1;
    background: linear-gradient(160deg, var(--volvo-navy) 0%, var(--volvo-dark) 100%);
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    padding: 52px 56px;
    position: relative;
    overflow: hidden;
  }

  .left-panel::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(184,196,208,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(184,196,208,0.03) 1px, transparent 1px);
    background-size: 56px 56px;
  }

  /* Diagonal silver stripe */
  .left-panel::after {
    content: '';
    position: absolute;
    top: -20%;
    right: -60px;
    width: 3px;
    height: 160%;
    background: linear-gradient(180deg, transparent, rgba(184,196,208,0.2), rgba(184,196,208,0.08), transparent);
    transform: rotate(-8deg);
  }

  .panel-logo {
    position: relative;
    z-index: 2;
  }

  .panel-logo img {
    height: 48px;
    filter: brightness(0) invert(1);
    opacity: 0.92;
  }

  .panel-tagline {
    position: relative;
    z-index: 2;
  }

  .panel-tagline h1 {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 38px;
    line-height: 1.15;
    color: var(--white);
    letter-spacing: -0.5px;
    margin-bottom: 16px;
  }

  .panel-tagline h1 span {
    color: var(--silver);
    font-weight: 400;
  }

  .panel-tagline p {
    font-size: 14px;
    color: var(--silver-dim);
    line-height: 1.6;
    max-width: 320px;
    font-weight: 300;
  }

  .panel-stats {
    position: relative;
    z-index: 2;
    display: flex;
    gap: 40px;
  }

  .stat { }
  .stat-num {
    font-family: 'Syne', sans-serif;
    font-size: 26px;
    font-weight: 700;
    color: var(--white);
    letter-spacing: -0.5px;
  }
  .stat-label {
    font-size: 11px;
    color: var(--silver-dim);
    letter-spacing: 1.5px;
    text-transform: uppercase;
    margin-top: 2px;
  }

  /* Right panel — login form */
  .right-panel {
    width: 440px;
    flex-shrink: 0;
    background: var(--volvo-mid);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 48px 44px;
    border-left: 1px solid var(--border);
    position: relative;
  }

  .right-panel::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: linear-gradient(90deg, transparent, var(--silver), transparent);
    opacity: 0.3;
  }

  .form-wrap {
    width: 100%;
    animation: formIn 0.5s cubic-bezier(0.22,1,0.36,1) forwards;
  }

  @keyframes formIn {
    from { opacity: 0; transform: translateX(16px); }
    to   { opacity: 1; transform: translateX(0); }
  }

  .form-header { margin-bottom: 40px; }

  .form-header h2 {
    font-family: 'Syne', sans-serif;
    font-size: 24px;
    font-weight: 700;
    color: var(--white);
    letter-spacing: -0.3px;
    margin-bottom: 6px;
  }

  .form-header p {
    font-size: 13px;
    color: var(--silver-dim);
    font-weight: 300;
  }

  .field-group { margin-bottom: 20px; }

  label {
    display: block;
    font-size: 10px;
    font-weight: 500;
    color: var(--silver-dim);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  input {
    width: 100%;
    background: rgba(255,255,255,0.04);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 13px 16px;
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    color: var(--white);
    outline: none;
    transition: border-color 0.2s, background 0.2s;
  }

  input:focus {
    border-color: var(--border-focus);
    background: rgba(184,196,208,0.06);
  }

  input::placeholder { color: rgba(122,138,154,0.6); }

  .btn-login {
    width: 100%;
    margin-top: 32px;
    padding: 14px;
    background: linear-gradient(135deg, #1E4A7A, var(--volvo-navy));
    border: 1px solid rgba(184,196,208,0.25);
    border-radius: 8px;
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 13px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--silver-light);
    cursor: pointer;
    transition: all 0.2s;
    box-shadow: 0 4px 20px rgba(0,48,87,0.4);
  }

  .btn-login:hover {
    background: linear-gradient(135deg, #2A5A8A, #0A4070);
    border-color: rgba(184,196,208,0.4);
    color: var(--white);
    transform: translateY(-1px);
    box-shadow: 0 8px 28px rgba(0,48,87,0.5);
  }

  .btn-login:active { transform: translateY(0); }

  .error-msg {
    display: none;
    margin-top: 14px;
    padding: 11px 14px;
    background: rgba(201,64,64,0.1);
    border: 1px solid rgba(201,64,64,0.25);
    border-radius: 7px;
    color: #E88;
    font-size: 13px;
    text-align: center;
  }

  .version {
    position: absolute;
    bottom: 24px;
    left: 0; right: 0;
    text-align: center;
    font-size: 10px;
    color: rgba(122,138,154,0.35);
    letter-spacing: 1.5px;
    text-transform: uppercase;
  }

  @media (max-width: 768px) {
    body { flex-direction: column; }
    .left-panel { padding: 36px 28px 32px; flex: none; min-height: 220px; }
    .panel-tagline h1 { font-size: 26px; }
    .panel-stats { gap: 24px; }
    .right-panel { width: 100%; padding: 36px 28px; border-left: none; border-top: 1px solid var(--border); }
  }
</style>
</head>
<body>

<!-- LEFT BRANDING PANEL -->
<div class="left-panel">
  <div class="panel-logo">
    <img src="logo.jpg" alt="Petras Group">
  </div>

  <div class="panel-tagline">
    <h1>Transport<br><span>Management</span><br>System</h1>
    <p>Πλήρης διαχείριση δρομολογίων, στόλου και κόστους για διεθνείς μεταφορές.</p>
  </div>

  <div class="panel-stats">
    <div class="stat">
      <div class="stat-num">36</div>
      <div class="stat-label">Trucks</div>
    </div>
    <div class="stat">
      <div class="stat-num">60</div>
      <div class="stat-label">Drivers</div>
    </div>
    <div class="stat">
      <div class="stat-num">397</div>
      <div class="stat-label">Partners</div>
    </div>
    <div class="stat">
      <div class="stat-num">4.7K</div>
      <div class="stat-label">Clients</div>
    </div>
  </div>
</div>

<!-- RIGHT LOGIN PANEL -->
<div class="right-panel">
  <div class="form-wrap">
    <div class="form-header">
      <h2>Καλώς ήρθατε</h2>
      <p>Συνδεθείτε με τα στοιχεία σας</p>
    </div>

    <div class="field-group">
      <label>Username</label>
      <input type="text" id="username" placeholder="Εισάγετε username" autocomplete="username">
    </div>

    <div class="field-group">
      <label>Password</label>
      <input type="password" id="password" placeholder="••••••••" autocomplete="current-password">
    </div>

    <button class="btn-login" onclick="doLogin()">Είσοδος →</button>
    <div class="error-msg" id="errMsg">Λάθος username ή password</div>
  </div>

  <div class="version">v1.0 · Petras Group TMS · 2026</div>
</div>

<script>
const USERS = [
  { username: 'dimitris',   password: 'petras2024',  role: 'owner',      name: 'Δημήτρης Πέτρας' },
  { username: 'dispatcher', password: 'dispatch24',  role: 'dispatcher', name: 'Dispatcher' },
  { username: 'management', password: 'manage24',    role: 'management', name: 'Management' },
  { username: 'accountant', password: 'account24',   role: 'accountant', name: 'Accountant' },
];

function doLogin() {
  const u = document.getElementById('username').value.trim().toLowerCase();
  const p = document.getElementById('password').value;
  const user = USERS.find(x => x.username === u && x.password === p);
  if (user) {
    sessionStorage.setItem('tms_user', JSON.stringify(user));
    window.location.href = 'app.html';
  } else {
    const err = document.getElementById('errMsg');
    err.style.display = 'block';
    setTimeout(() => err.style.display = 'none', 3000);
  }
}

document.addEventListener('keydown', e => { if(e.key === 'Enter') doLogin(); });
if(sessionStorage.getItem('tms_user')) window.location.href = 'app.html';
</script>
</body>
</html>
